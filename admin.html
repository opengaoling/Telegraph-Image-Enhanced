<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Telegraph Image</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
  <style>
    body { background-color: #f5f7fa; margin: 0; font-family: sans-serif; }
    .header { background: #fff; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.05); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 1000; }
    .main-content { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .list-view { background: #fff; border-radius: 8px; border: 1px solid #e6ebf5; }
    .list-item { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f0f2f5; }
    .list-item:last-child { border-bottom: none; }
    .list-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; margin-right: 15px; flex-shrink: 0; background: #eee; }
    .list-name-col { flex: 1; overflow: hidden; }
    [v-cloak] { display: none; }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <div class="header">
      <div style="font-size: 20px; font-weight: bold;">🖼️ Dashboard</div>
      <el-button size="mini" type="info" @click="handleLogout">退出</el-button>
    </div>
    <div class="main-content">
      <div class="list-view">
        <div v-for="(item, index) in tableData" :key="item.name" class="list-item">
          <img :src="'/file/'+item.name" class="list-thumb" loading="lazy">
          <div class="list-name-col">
              <div style="font-weight: 600;">{{ item.metadata && item.metadata.fileName ? item.metadata.fileName : item.name }}</div>
              <div style="font-size: 12px; color: #999; margin-top: 4px;">{{ formatTime(item.metadata && item.metadata.TimeStamp) }}</div>
          </div>
          <el-button size="mini" circle icon="el-icon-document-copy" @click="handleCopy(item.name)"></el-button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@2.7.14/dist/vue.min.js"></script>
  <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
  <script>
    new Vue({
      el: '#app',
      data: { tableData: [] },
      methods: {
        fetchData() {
            fetch('/api/manage/list?limit=100', {credentials: 'include'})
                .then(r => {
                    if (r.status !== 200) return null;
                    return r.json();
                })
                .then(res => {
                    if (res && res.keys) {
                        this.tableData = res.keys;
                    }
                })
                .catch(e => console.error(e));
        },
        formatTime(t) { return t ? new Date(t).toLocaleString('zh-CN') : 'N/A'; },
        handleCopy(name) { navigator.clipboard.writeText(location.origin+'/file/'+name).then(()=>this.$message.success('Copied!')); },
        handleLogout() { 
            fetch('/api/manage/logout', { method: 'POST', credentials: 'include' })
                .then(() => {
                    this.$message.success('已退出登录');
                    setTimeout(() => location.reload(), 500);
                });
        }
      },
      mounted() { this.fetchData(); }
    });
  </script>
</body>
</html>
