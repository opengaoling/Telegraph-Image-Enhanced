<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Telegraph Image</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui@2.15.14/lib/theme-chalk/index.css">
  <style>
    body { background-color: #f5f7fa; margin: 0; font-family: sans-serif; }
    .header { background: #fff; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.05); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 1000; }
    .main-content { padding: 24px; max-width: 1400px; margin: 0 auto; }
    
    .list-view { background: #fff; border-radius: 8px; border: 1px solid #e6ebf5; }
    .list-item { display: flex; align-items: center; padding: 12px 20px; border-bottom: 1px solid #f0f2f5; cursor: pointer; }
    .list-item:last-child { border-bottom: none; }
    .list-thumb { width: 45px; height: 45px; border-radius: 6px; object-fit: cover; margin-right: 15px; flex-shrink: 0; background: #eee; }
    
    .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
    .image-card { background: #fff; border-radius: 8px; overflow: hidden; position: relative; border: 2px solid transparent; }
    .image-wrapper { position: relative; width: 100%; height: 160px; background: #eee; cursor: pointer; overflow: hidden; }
    .image-wrapper img, .image-wrapper video { width: 100%; height: 100%; object-fit: cover; }
    .card-actions { position: absolute; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .image-card:hover .card-actions { opacity: 1; }
    [v-cloak] { display: none; }
  </style>
</head>
<body>
  <div id="app" v-cloak>
    <div class="header">
      <div style="font-size: 20px; font-weight: bold;">🖼️ Dashboard</div>
      <div style="display: flex; gap: 15px; align-items: center;">
        <el-radio-group v-model="viewMode" size="mini">
          <el-radio-button label="list">列表</el-radio-button>
          <el-radio-button label="grid">网格</el-radio-button>
        </el-radio-group>
        <el-button-group>
            <el-button size="mini" type="danger" icon="el-icon-delete" @click="handleBatchDelete">删除</el-button>
            <el-button size="mini" type="info" @click="handleLogout">退出</el-button>
        </el-button-group>
      </div>
    </div>

    <div class="main-content">
      <!-- 列表 -->
      <div v-if="viewMode === 'list'" class="list-view">
        <div v-for="(item, index) in tableData" :key="item.name" class="list-item" @click="toggleSelect(item.name)">
          <img :src="'/file/'+item.name" class="list-thumb" loading="lazy">
          <div style="flex: 1; overflow: hidden;">
              <div style="font-weight: 600;">{{ (item.metadata && item.metadata.fileName) || item.name }}</div>
              <div style="font-size: 12px; color: #999;">{{ formatTime(item.metadata && item.metadata.TimeStamp) }}</div>
          </div>
          <div style="display: flex; gap: 10px;">
            <el-button size="mini" circle icon="el-icon-zoom-in" @click.stop="handlePreview(item.name)"></el-button>
            <el-button size="mini" circle icon="el-icon-document-copy" type="primary" @click.stop="handleCopy(item.name)"></el-button>
            <el-button size="mini" circle icon="el-icon-delete" type="danger" @click.stop="handleDelete(index, item.name)"></el-button>
          </div>
        </div>
      </div>

      <!-- 网格 -->
      <div v-else class="image-grid">
        <div v-for="(item, index) in tableData" :key="item.name" class="image-card">
          <div class="image-wrapper" @click="handlePreview(item.name)">
            <video v-if="item.name.toLowerCase().endsWith('.mp4')" :src="'/file/'+item.name" muted></video>
            <img v-else :src="'/file/'+item.name" loading="lazy">
            <div class="card-actions">
                <el-button size="mini" circle icon="el-icon-document-copy" type="primary" @click.stop="handleCopy(item.name)"></el-button>
                <el-button size="mini" circle icon="el-icon-delete" type="danger" @click.stop="handleDelete(index, item.name)"></el-button>
            </div>
          </div>
          <div style="padding: 10px; font-size: 13px;">
            <div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ (item.metadata && item.metadata.fileName) || item.name }}</div>
          </div>
        </div>
      </div>
    </div>
    <el-image-viewer v-if="showViewer" :on-close="()=>showViewer=false" :url-list="viewerUrls"></el-image-viewer>
  </div>

  <script src="https://unpkg.com/vue@2.7.14/dist/vue.min.js"></script>
  <script src="https://unpkg.com/element-ui@2.15.14/lib/index.js"></script>
  <script>
    new Vue({
      el: '#app',
      components: { 'el-image-viewer': ELEMENT.Image.components.ImageViewer },
      data: {
        tableData: [], selectedIds: [], isLoggedIn: false, viewMode: localStorage.getItem('viewMode') || 'list',
        showViewer: false, viewerUrls: []
      },
      watch: { viewMode(v) { localStorage.setItem('viewMode', v); } },
      methods: {
        fetchData() {
          fetch('/api/manage/list?limit=100', {credentials: 'include'})
            .then(r => r.status === 200 ? r.json() : null)
            .then(res => { if (res && res.keys) this.tableData = res.keys; });
        },
        toggleSelect(id) {
            const idx = this.selectedIds.indexOf(id);
            if (idx > -1) this.selectedIds.splice(idx, 1); else this.selectedIds.push(id);
        },
        formatTime(t) { return t ? new Date(t).toLocaleString('zh-CN') : ''; },
        handleCopy(name) { navigator.clipboard.writeText(location.origin+'/file/'+name).then(()=>this.$message.success('Copied!')); },
        handleDelete(index, key) {
          if(confirm('Delete?')) fetch(`./api/manage/delete/${key}`, {credentials:'include'}).then(()=>{this.tableData.splice(index,1);});
        },
        handleBatchDelete() {
          if(confirm('Delete selected?')) fetch("./api/manage/delete_batch", {
              method: 'POST', body: JSON.stringify({ ids: this.selectedIds }), headers: {'Content-Type':'application/json'}, credentials: 'include'
          }).then(() => { this.selectedIds = []; this.fetchData(); });
        },
        handleLogout() { 
            fetch('/api/manage/logout', {method: 'POST', credentials: 'include'}).then(()=>location.reload()); 
        },
        handlePreview(name) {
          if (name.toLowerCase().endsWith('.mp4')) {
            window.open('/file/' + name, '_blank');
          } else {
            this.viewerUrls = ['/file/' + name];
            this.showViewer = true;
          }
        }
      },
      mounted() { this.fetchData(); }
    });
  </script>
</body>
</html>
